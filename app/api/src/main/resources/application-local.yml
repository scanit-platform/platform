spring:
  datasource:
    url: jdbc:h2:mem:scanit-local;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    show-sql: true
  flyway:
    enabled: true
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET:local-development-jwt-secret-key-32chars-min}
      expiration: ${APP_SECURITY_JWT_EXPIRATION:24h}
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
      allowed-methods: ${APP_SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${APP_SECURITY_CORS_ALLOWED_HEADERS:*}
      exposed-headers: ${APP_SECURITY_CORS_EXPOSED_HEADERS:Authorization,Location}

logging:
  level:
    org.springframework.transaction.interceptor: TRACE
    org.springframework.orm.jpa.JpaTransactionManager: DEBUG
