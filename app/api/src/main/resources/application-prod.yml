spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    clean-disabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  security:
    jwt:
      secret: ${APP_SECURITY_JWT_SECRET}
      expiration: ${APP_SECURITY_JWT_EXPIRATION}
    cors:
      allowed-origins: ${APP_SECURITY_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}
      allowed-methods: ${APP_SECURITY_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
      allowed-headers: ${APP_SECURITY_CORS_ALLOWED_HEADERS:*}
      exposed-headers: ${APP_SECURITY_CORS_EXPOSED_HEADERS:Authorization,Location}

logging:
  level:
    org.springframework.transaction.interceptor: INFO
    org.springframework.orm.jpa.JpaTransactionManager: INFO
    org.springframework.jdbc.datasource.init: INFO
